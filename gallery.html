<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería | Confecciones Lina</title>
    <meta
      name="description"
      content="Galería de imágenes de productos y estilos disponibles en Lina."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="navbar container">
        <a class="brand" href="index.html">Lina</a>
        <div class="nav-links">
          <a href="index.html#catalogo">Catálogo</a>
          <a href="gallery.html">Galería</a>
          <a href="cart.html">Carrito</a>
          <a href="index.html#ubicacion">Ubicación</a>
        </div>
        <div class="nav-actions">
          <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">🌙</button>
          <button id="loginBtn" class="secondary-btn">Iniciar sesión</button>
          <a class="cart-btn" href="cart.html">🛒 <span id="cartCount">0</span></a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section container gallery-page" id="galleryPage">
        <div class="section-head">
          <div>
            <p class="eyebrow">Galería de imágenes</p>
            <h2>Inspiración para tu próximo outfit</h2>
          </div>
        </div>
        <div class="gallery-grid">
          <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=900&q=80" alt="Prenda elegante" />
          <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=900&q=80" alt="Estilo casual" />
          <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80" alt="Colección femenina" />
          <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80" alt="Outfit urbano" />
          <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=900&q=80" alt="Casual contemporáneo" />
          <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=900&q=80" alt="Look moderno" />
        </div>
      </section>
    </main>

    <div id="loginModal" class="modal hidden">
      <div class="modal-card">
        <button class="close-btn" id="closeLogin">×</button>
        <h3 id="authTitle">Ingreso de usuario</h3>
        <p id="authInfo">Ingresa tu usuario. Si no tienes cuenta, regístrate.</p>
        <form id="loginForm">
          <div class="field">
            <label for="loginUsername">Usuario</label>
            <input type="text" id="loginUsername" placeholder="Usuario" required autocomplete="username" />
          </div>
          <div class="field hidden" id="passwordGroup">
            <label for="loginPassword">Contraseña</label>
            <div class="password-field">
              <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" />
              <button type="button" id="togglePassword" class="secondary-btn">Mostrar</button>
            </div>
          </div>
          <div class="login-actions">
            <button type="submit" class="primary-btn" id="submitButton">Ingresar</button>
            <button type="button" class="secondary-btn" id="toggleRegister">Registrarse</button>
          </div>
          <p id="loginError" class="form-feedback" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
